<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Nova Control — Industrial Desktop App placeholder">
  <defs>
    <linearGradient id="bg-nova" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#15171c"/>
    </linearGradient>
    <pattern id="grid-nova" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg-nova)"/>

  <!-- Faint SCADA-style grid in the background -->
  <rect width="1200" height="675" fill="url(#grid-nova)"/>

  <!-- Status indicators on the right (mimic SCADA traffic light row) -->
  <g>
    <circle cx="1080" cy="160" r="14" fill="#10b981" opacity="0.85"/>
    <circle cx="1080" cy="220" r="14" fill="#f59e0b" opacity="0.7"/>
    <circle cx="1080" cy="280" r="14" fill="#ef4444" opacity="0.7"/>
    <line x1="900" y1="160" x2="1054" y2="160" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    <line x1="900" y1="220" x2="1054" y2="220" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
    <line x1="900" y1="280" x2="1054" y2="280" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Title block -->
  <text x="80" y="320" fill="#e5e5e5" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="76" font-weight="700">Nova Control</text>
  <text x="82" y="370" fill="#3b82f6" font-family="ui-monospace, 'JetBrains Mono', Consolas, monospace" font-size="22" font-weight="600" letter-spacing="4">DESKTOP · 14 MODULES · 496 TESTS</text>

  <!-- Footer hint -->
  <text x="80" y="620" fill="#6b7280" font-family="ui-monospace, 'JetBrains Mono', Consolas, monospace" font-size="14" letter-spacing="2">PLACEHOLDER — REAL SCREENSHOT COMING</text>
</svg>
