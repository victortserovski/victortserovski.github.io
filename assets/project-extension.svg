<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Fake Discount BG — Chrome Extension placeholder">
  <defs>
    <linearGradient id="bg-ext" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#15171c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg-ext)"/>

  <!-- Ascending price-chart bars in lower right -->
  <g opacity="0.18" fill="#3b82f6">
    <rect x="820"  y="500" width="32" height="120" rx="4"/>
    <rect x="870"  y="460" width="32" height="160" rx="4"/>
    <rect x="920"  y="430" width="32" height="190" rx="4"/>
    <rect x="970"  y="380" width="32" height="240" rx="4"/>
    <rect x="1020" y="340" width="32" height="280" rx="4"/>
    <rect x="1070" y="300" width="32" height="320" rx="4"/>
    <rect x="1120" y="260" width="32" height="360" rx="4"/>
  </g>

  <!-- Diagonal accent line (verdict slash) -->
  <line x1="820" y1="630" x2="1170" y2="240" stroke="#3b82f6" stroke-width="3" opacity="0.4" stroke-linecap="round"/>

  <!-- Title block -->
  <text x="80" y="320" fill="#e5e5e5" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="76" font-weight="700">Fake Discount BG</text>
  <text x="82" y="370" fill="#3b82f6" font-family="ui-monospace, 'JetBrains Mono', Consolas, monospace" font-size="22" font-weight="600" letter-spacing="4">CHROME EXTENSION · MANIFEST V3</text>

